name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Swift ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, ubuntu-24.04]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Swift Version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
